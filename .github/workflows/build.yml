name: Build MaplePSA
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Patch Code (Full Unicode Conversion)
      shell: powershell
      run: |
        $path = "MaplePS.cpp"
        $code = Get-Content $path
        
        # 1. Добавляем L ко всем строкам, у которых его нет
        # Это пофиксит ошибки сложения wstring + "string"
        $code = $code -replace '(?<!L)"(.*?)"', 'L"$1"'
        
        # 2. Меняем Ansi-функции на Wide-версии, раз уж мы в Unicode моде
        $code = $code -replace 'CreateProcessA', 'CreateProcessW'
        $code = $code -replace 'GetFileAttributesA', 'GetFileAttributesW'
        $code = $code -replace 'SetFileAttributesA', 'SetFileAttributesW'
        $code = $code -replace 'DeleteFileA', 'DeleteFileW'
        $code = $code -replace 'CopyFileA', 'CopyFileW'
        $code = $code -replace 'MessageBoxA', 'MessageBoxW'
        $code = $code -replace 'CHAR', 'WCHAR'
        
        # 3. Фиксим wcstombs_s - это мусор для логов, просто закомментим его
        $code = $code -replace 'wcstombs_s', '//wcstombs_s'
        
        $code | Set-Content $path

    - name: Build Solution
      run: msbuild MaplePS.sln /p:Configuration=Release /p:Platform=x64 /p:CharacterSet=Unicode
