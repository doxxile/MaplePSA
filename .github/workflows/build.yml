name: Build MaplePSA
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Memory Leak Fix (Process Finder)
      shell: powershell
      run: |
        $code = Get-Content -Raw MaplePS.cpp
        
        # Меняем сигнатуру функции на Wide
        $code = $code.Replace('DWORD ProcessID(const char* lpProcessName)', 'DWORD ProcessID(const wchar_t* lpProcessName)')
        
        # Вырезаем старый буфер, который жрал память
        $code = $code.Replace('char lpCurrentProcessName[255];', '')
        
        # Вырезаем кривую конвертацию
        $code = $code -replace 'wcstombs_s[^;]+;', ''
        
        # Заставляем сравнивать напрямую нормальную юникодную строку из системы
        $code = $code.Replace('lstrcmpA(lpCurrentProcessName, lpProcessName)', 'lstrcmpW(ProcList.szExeFile, lpProcessName)')
        
        # Фиксим вызов в мейне
        $code = $code.Replace('ProcessID("osu!.exe")', 'ProcessID(L"osu!.exe")')
        
        # Остальные А->W замены
        $code = $code.Replace('CreateProcessA', 'CreateProcessW')
        $code = $code.Replace('GetFileAttributesA', 'GetFileAttributesW')
        $code = $code.Replace('SetFileAttributesA', 'SetFileAttributesW')
        $code = $code.Replace('DeleteFileA', 'DeleteFileW')
        $code = $code.Replace('CopyFileA', 'CopyFileW')
        
        $code | Set-Content MaplePS.cpp

    - name: Build Solution
      run: msbuild MaplePS.sln /p:Configuration=Release /p:Platform=x64 /p:CharacterSet=Unicode

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaplePS-Binary
        path: x64/Release/
